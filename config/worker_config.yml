# FILE: anarcrypt.sol/anaheim-worker/config/worker_config.yml
# 🧠 Anaheim Worker Runtime Configuration
# Tout ce qui touche aux tâches périodiques, au rythme et au comportement du daemon.

version: 1.0

runtime:
  interval_seconds: 30         # ⏱ Intervalle entre chaque exécution du main loop
  retry_delay_seconds: 10      # ⏳ Délai en cas d’échec avant retry
  max_retries: 5               # 🔁 Nombre max de tentatives avant skip

solana:
  cluster_url: ${SOLANA_CLUSTER_URL}
  program_id: ${PROGRAM_ID}
  commitment: confirmed

database:
  path: /work/data/memory.sqlite
  auto_backup: true
  export_json: /work/data/fixes.json

paths:
  repo_path: /work/project
  governance_path: /work/governance
  patch_dir: /work/data/patches
  logs: /work/logs
  screenshots: /work/data/screenshots
  playwright_cache: /work/data/playwright

logging:
  level: INFO
  colorize: true
  save_to_file: true
  log_file: /work/logs/worker.log

devtools:
  enable_playwright_checks: true
  headless: true
  urls:
    - http://localhost:3000/
    - http://localhost:3000/account
  selectors:
    - 'main'
    - 'button'
    - 'h1'
